<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Editor Markdown Pro</title>

    <!-- Web App Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    transitionTimingFunction: {
                        'spring': 'cubic-bezier(0.16, 1, 0.3, 1)',
                    }
                }
            }
        }
    </script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons (Substituindo FontAwesome para estética mais limpa / Pro Max) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- CodeMirror -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/markdown/markdown.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">

    <!-- Parsers & Security -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

    <!-- Highlight.js -->
    <link id="hljs-theme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

    <style>
        /* Globals & Utility */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        .no-tabs-view { display: none; }
        body.empty-state .no-tabs-view { display: flex; }
        body.empty-state main, body.empty-state .toolbar { display: none !important; }

        /* CodeMirror Overrides */
        .CodeMirror {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            height: 100% !important;
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            font-size: 14px;
            line-height: 1.6;
            padding: 16px 0;
            background-color: transparent !important;
        }
        .CodeMirror-gutters { background-color: transparent !important; border-right: none; padding-right: 15px; opacity: 0.5; }
        
        /* Força a transparência no tema Dracula para integrar com o nosso fundo */
        .cm-s-dracula.CodeMirror, .cm-s-dracula .CodeMirror-gutters { background-color: transparent !important; }

        /* Resizer Pro Max - Premium Splitter */
        .resizer { cursor: col-resize; width: 8px; z-index: 10; transition: background-color 0.4s cubic-bezier(0.16, 1, 0.3, 1); display: flex; align-items: center; justify-content: center; background-color: transparent; border-left: 1px solid var(--resizer-border); }
        .resizer:hover, .resizer:active { background-color: var(--resizer-bg-hover); }
        .resizer:hover .resizer-handle, .resizer:active .resizer-handle { height: 48px; width: 4px; background-color: var(--accent-color); box-shadow: 0 0 12px rgba(0, 117, 222, 0.4); border-radius: 4px; }
        .resizer-handle { width: 3px; height: 24px; border-radius: 4px; background-color: var(--resizer-handle); transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); pointer-events: none; }

        /* Markdown Typography Pro Max */
        .markdown-body {
            font-size: 16px; line-height: 1.7; word-wrap: break-word; padding: 48px 64px; max-width: 800px; margin: 0 auto;
            color: inherit;
        }
        .markdown-body p, .markdown-body blockquote, .markdown-body pre { margin-bottom: 1.5em; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { margin-top: 2em; margin-bottom: 0.75em; font-weight: 600; tracking: -0.02em; }
        .markdown-body h1 { font-size: 2.25em; border-bottom: 1px solid currentColor; padding-bottom: 0.3em; opacity: 0.9; }
        .markdown-body h2 { font-size: 1.75em; }
        .markdown-body ul, .markdown-body ol { padding-left: 1.5em; margin-bottom: 1.5em; }
        .markdown-body li { margin-bottom: 0.5em; }
        .markdown-body ul { list-style-type: disc; }
        .markdown-body ol { list-style-type: decimal; }
        .markdown-body code { background: rgba(128,128,128,0.1); padding: 0.2em 0.4em; border-radius: 4px; font-size: 0.9em; font-family: monospace; }
        .markdown-body pre code { background: transparent; padding: 0; }
        .markdown-body pre { background: rgba(128,128,128,0.05); padding: 16px; border-radius: 8px; overflow-x: auto; border: 1px solid rgba(128,128,128,0.1); }
        .markdown-body blockquote { border-left: 4px solid currentColor; padding-left: 1em; opacity: 0.7; font-style: italic; }

        /* Toolbar & Icons */
        .toolbar-btn { transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); }
        .toolbar-btn:active { transform: scale(0.92); }
        .icon-btn { transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); }
        .icon-btn:active { transform: scale(0.92); }

        /* =======================================================
           TEMA BASE E MODO ESCURO
           ======================================================= */
        body { font-family: 'Inter', -apple-system, sans-serif; background-color: #ffffff; color: rgba(0,0,0,0.95); --accent-color: #0075de; --dot-color: rgba(0,0,0,0.05); transition: background-color 0.3s, color 0.3s; }
        .app-header, .toolbar { border-bottom-color: rgba(0,0,0,0.1); transition: background-color 0.3s, border-color 0.3s; }
        .toolbar-btn { border-radius: 6px; color: #615d59; }
        .toolbar-btn:hover { background-color: rgba(0,0,0,0.05); color: rgba(0,0,0,0.95); }
        .icon-btn { color: #615d59; border-radius: 6px;}
        .icon-btn:hover { color: rgba(0,0,0,0.95); background-color: rgba(0,0,0,0.05); }
        .resizer { --resizer-border: rgba(0,0,0,0.06); --resizer-bg-hover: rgba(0,0,0,0.02); }
        .resizer-handle { background-color: rgba(0,0,0,0.15); }
        .tab-active { border-top: 2px solid var(--accent-color); background: #ffffff; color: rgba(0,0,0,0.95); }
        .tab-inactive { border-top: 2px solid transparent; opacity: 0.6; }
        .tab-inactive:hover { background-color: rgba(0,0,0,0.02); opacity: 1; }

        /* Modo Escuro - Estética Pro Max (Zinc) */
        .dark body { background-color: #09090b; color: #e4e4e7; --dot-color: rgba(255,255,255,0.05); }
        .dark .app-header, .dark .toolbar { background-color: #18181b; border-bottom-color: #27272a; }
        .dark #left-pane, .dark #right-pane { background-color: #09090b; border-color: #27272a; }
        .dark .toolbar-btn, .dark .icon-btn { color: #a1a1aa; }
        .dark .toolbar-btn:hover, .dark .icon-btn:hover { color: #ffffff; background-color: #27272a; }
        .dark .resizer { --resizer-border: rgba(255,255,255,0.05); --resizer-bg-hover: rgba(255,255,255,0.03); }
        .dark .resizer-handle { background-color: rgba(255,255,255,0.15); }
        .dark .tab-active { background-color: #09090b; border-top-color: var(--accent-color); color: #ffffff; }
        .dark .tab-inactive { color: #a1a1aa; }
        .dark .tab-inactive:hover { background-color: rgba(255,255,255,0.03); color: #e4e4e7; }
        
        /* Garante que o fundo do código do highlight.js respeite nosso container */
        .markdown-body pre code.hljs { background: transparent !important; }

        /* Dropdown Menu CSS */
        .dropdown-menu { background-color: #ffffff; border: 1px solid rgba(0,0,0,0.1); }
        .dropdown-item { color: rgba(0,0,0,0.95); }
        .dropdown-item:hover { background-color: rgba(0,0,0,0.05); }
        
        .dark .dropdown-menu { background-color: #18181b; border-color: #27272a; }
        .dark .dropdown-item { color: #e4e4e7; }
        .dark .dropdown-item:hover { background-color: rgba(255,255,255,0.05); }
    </style>
</head>
<body class="h-[100dvh] flex flex-col overflow-hidden">

    <input type="file" id="file-input" accept=".md,.txt,text/markdown,text/plain" multiple class="hidden">

    <!-- Header -->
    <header class="app-header flex items-center justify-between text-sm select-none shrink-0 relative z-30 h-12">
        <div class="flex items-center h-full min-w-0 w-full pl-2">
            <!-- Ações de Arquivo -->
            <div class="relative flex items-center shrink-0 space-x-1 mr-2">
                <!-- Botão de Menu de Arquivos -->
                <button id="btn-file-menu" class="w-10 h-9 icon-btn flex items-center justify-center" title="Menu de Arquivo">
                    <i class="ph ph-folder text-xl"></i>
                    <i class="ph ph-caret-down text-[10px] ml-1 opacity-70"></i>
                </button>
                
                <!-- Dropdown do Menu -->
                <div id="file-menu-dropdown" class="dropdown-menu absolute left-0 top-10 mt-1 w-48 rounded-lg shadow-xl py-1 z-50 hidden flex-col">
                    <button id="menu-action-open" class="dropdown-item text-left px-4 py-2 text-sm flex items-center w-full transition-colors">
                        <i class="ph ph-folder-open mr-2 text-lg opacity-70"></i> Abrir Arquivo
                    </button>
                    <button id="menu-action-save" class="dropdown-item text-left px-4 py-2 text-sm flex items-center w-full transition-colors">
                        <i class="ph ph-floppy-disk mr-2 text-lg opacity-70"></i> Salvar
                    </button>
                    <button id="menu-action-save-as" class="dropdown-item text-left px-4 py-2 text-sm flex items-center w-full transition-colors">
                        <i class="ph ph-files mr-2 text-lg opacity-70"></i> Salvar Como...
                    </button>
                </div>

                <button id="btn-new" class="w-9 h-9 icon-btn flex items-center justify-center" title="Novo Arquivo">
                    <i class="ph ph-file-plus text-xl"></i>
                </button>
            </div>
            
            <!-- Divisor Vertical -->
            <div class="w-px h-5 bg-black/10 dark:bg-white/10 shrink-0"></div>

            <div id="tabs-container" class="flex items-end h-full overflow-x-auto overflow-y-hidden scrollbar-hide flex-1 space-x-1 ml-2">
                <!-- Abas geradas via JS -->
            </div>
        </div>

        <div class="flex items-center px-4 h-full space-x-2 border-l border-black/10 dark:border-white/10 shrink-0">
            <!-- Botão Toggle Editor (Movido para antes do tema) -->
            <button id="btn-toggle-editor" class="w-10 h-10 icon-btn flex items-center justify-center" title="Ocultar / Mostrar Editor">
                <i id="toggle-editor-icon" class="ph ph-pencil-simple text-xl"></i>
            </button>

            <!-- Botão Tema Claro/Escuro -->
            <button id="btn-theme-toggle" class="w-10 h-10 icon-btn flex items-center justify-center" title="Alternar Modo Escuro">
                <i id="theme-icon" class="ph ph-moon text-xl"></i>
            </button>
        </div>
    </header>

    <!-- Toolbar -->
    <div class="toolbar shrink-0 w-full relative z-20 flex items-center px-4 py-1.5 space-x-1 overflow-x-auto scrollbar-hide">
        <!-- Controlos de Edição -->
        <button class="toolbar-btn w-8 h-8 flex items-center justify-center" onclick="format('undo')" title="Desfazer (Ctrl+Z)"><i class="ph ph-arrow-u-up-left text-lg"></i></button>
        <button class="toolbar-btn w-8 h-8 flex items-center justify-center" onclick="format('redo')" title="Refazer (Ctrl+Y)"><i class="ph ph-arrow-u-up-right text-lg"></i></button>
        <div class="w-px h-4 bg-black/20 dark:bg-white/20 mx-2"></div>

        <!-- Formatação de Texto -->
        <button class="toolbar-btn w-8 h-8 flex items-center justify-center" onclick="format('bold')" title="Negrito"><i class="ph ph-text-b text-lg"></i></button>
        <button class="toolbar-btn w-8 h-8 flex items-center justify-center" onclick="format('italic')" title="Itálico"><i class="ph ph-text-italic text-lg"></i></button>
        <button class="toolbar-btn w-8 h-8 flex items-center justify-center" onclick="format('strikethrough')" title="Tachado"><i class="ph ph-text-strikethrough text-lg"></i></button>
        <button class="toolbar-btn w-8 h-8 flex items-center justify-center" onclick="format('highlight')" title="Destacar (Highlight)"><i class="ph ph-highlighter text-lg"></i></button>
        <div class="w-px h-4 bg-black/20 dark:bg-white/20 mx-2"></div>

        <!-- Títulos -->
        <button class="toolbar-btn w-8 h-8 flex items-center justify-center font-bold text-sm" onclick="format('h1')" title="Título 1">H1</button>
        <button class="toolbar-btn w-8 h-8 flex items-center justify-center font-bold text-sm" onclick="format('h2')" title="Título 2">H2</button>
        <button class="toolbar-btn w-8 h-8 flex items-center justify-center font-bold text-sm" onclick="format('h3')" title="Título 3">H3</button>
        <button class="toolbar-btn w-8 h-8 flex items-center justify-center font-bold text-sm" onclick="format('h4')" title="Título 4">H4</button>
        <div class="w-px h-4 bg-black/20 dark:bg-white/20 mx-2"></div>

        <!-- Listas e Citações -->
        <button class="toolbar-btn w-8 h-8 flex items-center justify-center" onclick="format('ul')" title="Lista"><i class="ph ph-list-bullets text-lg"></i></button>
        <button class="toolbar-btn w-8 h-8 flex items-center justify-center" onclick="format('ol')" title="Lista Numerada"><i class="ph ph-list-numbers text-lg"></i></button>
        <button class="toolbar-btn w-8 h-8 flex items-center justify-center" onclick="format('task')" title="Lista de Tarefas"><i class="ph ph-check-square-offset text-lg"></i></button>
        <button class="toolbar-btn w-8 h-8 flex items-center justify-center" onclick="format('quote')" title="Citação"><i class="ph ph-quotes text-lg"></i></button>
        <div class="w-px h-4 bg-black/20 dark:bg-white/20 mx-2"></div>

        <!-- Elementos Avançados -->
        <button class="toolbar-btn w-8 h-8 flex items-center justify-center" onclick="format('code')" title="Código Inline"><i class="ph ph-code text-lg"></i></button>
        <button class="toolbar-btn w-8 h-8 flex items-center justify-center" onclick="format('codeblock')" title="Bloco de Código"><i class="ph ph-file-code text-lg"></i></button>
        <button class="toolbar-btn w-8 h-8 flex items-center justify-center" onclick="format('link')" title="Link"><i class="ph ph-link text-lg"></i></button>
        <button class="toolbar-btn w-8 h-8 flex items-center justify-center" onclick="format('image')" title="Imagem"><i class="ph ph-image text-lg"></i></button>
        <button class="toolbar-btn w-8 h-8 flex items-center justify-center" onclick="format('table')" title="Tabela"><i class="ph ph-table text-lg"></i></button>
        <button class="toolbar-btn w-8 h-8 flex items-center justify-center" onclick="format('hr')" title="Linha Separadora"><i class="ph ph-minus text-lg"></i></button>
    </div>

    <!-- Empty State -->
    <div class="no-tabs-view flex-1 flex-col items-center justify-center relative bg-[#fafafa] dark:bg-[#09090b]">
        <div class="absolute inset-0" style="background-image: radial-gradient(circle at 1px 1px, var(--dot-color) 1px, transparent 0); background-size: 24px 24px;"></div>
        <div class="z-10 text-center">
            <div class="w-16 h-16 bg-white dark:bg-[#18181b] rounded-2xl shadow-sm border border-gray-200 dark:border-[#27272a] flex items-center justify-center mx-auto mb-6">
                <i class="ph ph-markdown-logo text-3xl opacity-50"></i>
            </div>
            <h2 class="text-xl font-semibold mb-2">Editor Pronto</h2>
            <p class="text-sm opacity-60 mb-8 max-w-xs mx-auto">Arraste arquivos Markdown aqui ou crie um novo para começar.</p>
            <button id="btn-open-large" class="px-6 py-2.5 rounded-lg text-white bg-black dark:bg-white dark:text-black hover:scale-95 transition-transform ease-spring duration-300 font-medium text-sm shadow-md">
                Abrir Arquivos Locais
            </button>
        </div>
    </div>

    <!-- Main Workspace -->
    <main class="flex-1 flex overflow-hidden w-full relative">
        
        <!-- Left Pane (Editor) -->
        <div id="left-pane" class="w-1/2 h-full relative overflow-hidden flex flex-col">
            <textarea id="editor"></textarea>
        </div>

        <!-- Resizer Visível -->
        <div id="resizer" class="resizer flex-shrink-0 relative group">
            <div class="resizer-handle"></div>
        </div>

        <!-- Right Pane (Preview) -->
        <div id="right-pane" class="flex-1 h-full overflow-y-auto relative">
            <div id="preview" class="markdown-body pb-32"></div>
        </div>

    </main>

    <script>
        // Setup Marked.js with DOMPurify and Highlight.js
        marked.setOptions({ 
            gfm: true, 
            breaks: true, 
            highlight: (code, lang) => {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            }
        });

        // App State
        let files = [];
        let activeFileId = null;
        let fileCounter = 1;
        const hasFSAPI = 'showOpenFilePicker' in window;

        // DOM Elements
        const textarea = document.getElementById('editor');
        const preview = document.getElementById('preview');
        const previewContainer = document.getElementById('right-pane');
        const leftPane = document.getElementById('left-pane');
        const tabsContainer = document.getElementById('tabs-container');
        const fileInput = document.getElementById('file-input');
        const resizer = document.getElementById('resizer');

        // Setup Inicial do Modo (Modo Claro como padrão)
        let isDark = false;

        // Initialize CodeMirror
        const cm = CodeMirror.fromTextArea(textarea, {
            mode: 'markdown',
            theme: isDark ? 'dracula' : 'default',
            lineNumbers: true,
            lineWrapping: true,
            viewportMargin: Infinity,
            extraKeys: {"Enter": "newlineAndIndentContinueMarkdownList"}
        });

        const generateId = () => '_' + Math.random().toString(36).substr(2, 9);

        // Formatter Logic
        function format(type) {
            if (!activeFileId) return;

            // Tratamento especial para o histórico
            if (type === 'undo') { cm.undo(); cm.focus(); return; }
            if (type === 'redo') { cm.redo(); cm.focus(); return; }

            const selection = cm.getSelection();
            const cursor = cm.getCursor();
            const line = cm.getLine(cursor.line);

            const formatMap = {
                'bold': `**${selection || 'texto'}**`,
                'italic': `_${selection || 'texto'}_`,
                'strikethrough': `~~${selection || 'texto'}~~`,
                'highlight': `<mark>${selection || 'texto em destaque'}</mark>`,
                'code': `\`${selection || 'código'}\``,
                'codeblock': `\n\`\`\`\n${selection || 'insira o seu código aqui'}\n\`\`\`\n`,
                'link': `[${selection || 'título do link'}](https://example.com)`,
                'image': `![${selection || 'descrição da imagem'}](url-da-imagem)`,
                'table': `\n| Coluna 1 | Coluna 2 | Coluna 3 |\n| :--- | :---: | ---: |\n| Texto | Centralizado | Direita |\n| Linha 2 | Linha 2 | Linha 2 |\n`,
                'hr': `\n---\n`
            };

            const lineFormatMap = {
                'h1': `# ${line.replace(/^#+\s/, '')}`,
                'h2': `## ${line.replace(/^#+\s/, '')}`,
                'h3': `### ${line.replace(/^#+\s/, '')}`,
                'h4': `#### ${line.replace(/^#+\s/, '')}`,
                'ul': `- ${line.replace(/^[-*]\s/, '')}`,
                'ol': `1. ${line.replace(/^\d+\.\s/, '')}`,
                'task': `- [ ] ${line.replace(/^([-*]\s\[[ x]\]\s|[-*]\s|\d+\.\s)/, '')}`,
                'quote': `> ${line.replace(/^>\s/, '')}`
            };

            if (formatMap[type]) {
                cm.replaceSelection(formatMap[type]);
            } else if (lineFormatMap[type]) {
                cm.replaceRange(lineFormatMap[type], {line: cursor.line, ch: 0}, {line: cursor.line, ch: line.length});
            }
            cm.focus();
        }

        // File Management
        function createNewFile(name, content = "", fileHandle = null) {
            const id = generateId();
            const doc = CodeMirror.Doc(content, 'markdown');
            files.push({ id, name, doc, fileHandle, isDirty: false, showEditor: false, splitRatio: 50 });
            switchTab(id);
        }

        function applyLayoutState(file) {
            if (!file) return;
            const toggleIcon = document.getElementById('toggle-editor-icon');
            const toolbar = document.querySelector('.toolbar');
            
            if (file.showEditor) {
                leftPane.style.display = 'flex';
                leftPane.style.width = `${file.splitRatio}%`;
                resizer.style.display = 'flex';
                toggleIcon.className = 'ph ph-book-open text-xl'; // Ícone de leitura para fechar
                toolbar.style.display = 'flex'; // Exibe a barra de formatação no modo edição
                setTimeout(() => cm.refresh(), 50);
            } else {
                leftPane.style.display = 'none';
                resizer.style.display = 'none';
                toggleIcon.className = 'ph ph-pencil-simple text-xl'; // Ícone de lápis para abrir
                toolbar.style.display = 'none'; // Esconde barra de formatação para leitura limpa
            }
        }

        function switchTab(id) {
            const file = files.find(f => f.id === id);
            if (!file) return;
            activeFileId = id;
            cm.swapDoc(file.doc);
            renderTabs();
            updatePreview();
            updateEmptyState();
            applyLayoutState(file);
            if (file.showEditor) cm.focus();
        }

        function closeTab(id, event) {
            event.stopPropagation();
            const fileIndex = files.findIndex(f => f.id === id);
            if (fileIndex === -1) return;
            const file = files[fileIndex];
            
            if (file.isDirty && confirm(`Salvar as alterações em "${file.name}"?`)) {
                saveFile(file.id);
            }
            
            files.splice(fileIndex, 1);
            if (activeFileId === id) {
                if (files.length > 0) {
                    switchTab(files[Math.min(fileIndex, files.length - 1)].id);
                } else { 
                    activeFileId = null; 
                    cm.setValue(""); 
                    updatePreview(); 
                    renderTabs(); 
                    updateEmptyState(); 
                }
            } else {
                renderTabs();
            }
        }

        function renderTabs() {
            tabsContainer.innerHTML = '';
            files.forEach(file => {
                const isActive = file.id === activeFileId;
                const tab = document.createElement('div');
                tab.className = `flex items-center px-4 h-full cursor-pointer transition-all duration-300 max-w-[200px] group flex-shrink-0 ${isActive ? 'tab-active' : 'tab-inactive'}`;
                tab.onclick = () => switchTab(file.id);
                
                const dirtyDot = file.isDirty ? `<div class="w-1.5 h-1.5 rounded-full bg-current ml-2 opacity-50"></div>` : '';
                
                tab.innerHTML = `
                    <i class="ph ph-file-text mr-2 text-lg opacity-70 flex-shrink-0"></i>
                    <span class="truncate select-none text-[13px]">${file.name}</span>
                    ${dirtyDot}
                    <div class="ml-2 w-5 h-5 rounded hover:bg-black/10 dark:hover:bg-white/10 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity" onclick="closeTab('${file.id}', event)">
                        <i class="ph ph-x text-sm"></i>
                    </div>
                `;
                tabsContainer.appendChild(tab);
            });
        }

        function updateEmptyState() { 
            document.body.classList.toggle('empty-state', files.length === 0); 
        }
        
        function updatePreview() {
            if (!activeFileId) { preview.innerHTML = ''; return; }
            preview.innerHTML = DOMPurify.sanitize(marked.parse(cm.getValue()));
        }

        // Live Preview Update
        let previewTicking = false;
        cm.on("change", () => {
            if (activeFileId) {
                const file = files.find(f => f.id === activeFileId);
                if (file && !file.isDirty) { 
                    file.isDirty = true; 
                    renderTabs(); 
                }
                
                if (!previewTicking) {
                    requestAnimationFrame(() => {
                        updatePreview();
                        previewTicking = false;
                    });
                    previewTicking = true;
                }
            }
        });

        // Editor Toggle Logic
        document.getElementById('btn-toggle-editor').addEventListener('click', () => {
            if (!activeFileId) return;
            const file = files.find(f => f.id === activeFileId);
            if (file) {
                file.showEditor = !file.showEditor;
                applyLayoutState(file);
                if (file.showEditor) cm.focus();
            }
        });

        // I/O Operations
        async function openFiles() {
            if (hasFSAPI) {
                try {
                    const handles = await window.showOpenFilePicker({ 
                        multiple: true, 
                        types: [{ description: 'Markdown', accept: { 'text/markdown': ['.md', '.markdown'], 'text/plain': ['.txt'] } }] 
                    });
                    for (const handle of handles) {
                        const file = await handle.getFile();
                        createNewFile(file.name, await file.text(), handle);
                    }
                } catch (err) { 
                    if (err.name !== 'AbortError') fileInput.click(); 
                }
            } else {
                fileInput.click();
            }
        }

        // Lógica do Menu Dropdown de Arquivos
        const btnFileMenu = document.getElementById('btn-file-menu');
        const fileMenuDropdown = document.getElementById('file-menu-dropdown');
        
        btnFileMenu.addEventListener('click', (e) => {
            e.stopPropagation();
            const isHidden = fileMenuDropdown.classList.contains('hidden');
            if (isHidden) {
                fileMenuDropdown.classList.remove('hidden');
                fileMenuDropdown.classList.add('flex');
            } else {
                fileMenuDropdown.classList.add('hidden');
                fileMenuDropdown.classList.remove('flex');
            }
        });

        // Fechar dropdown ao clicar fora
        document.addEventListener('click', () => {
            fileMenuDropdown.classList.add('hidden');
            fileMenuDropdown.classList.remove('flex');
        });

        // Ações do Menu
        document.getElementById('menu-action-open').onclick = openFiles;
        document.getElementById('menu-action-save').onclick = () => saveFile();
        document.getElementById('menu-action-save-as').onclick = () => saveFileAs();

        document.getElementById('btn-open-large').onclick = openFiles;
        document.getElementById('btn-new').onclick = () => createNewFile(`Sem título ${fileCounter++}.md`, "");

        fileInput.onchange = async (e) => {
            for (const file of e.target.files) {
                createNewFile(file.name, await file.text());
            }
            fileInput.value = '';
        };

        async function saveFile(fileId = activeFileId) {
            const file = files.find(f => f.id === fileId);
            if (!file) return;
            
            if (hasFSAPI && file.fileHandle) {
                try {
                    const writable = await file.fileHandle.createWritable();
                    await writable.write(file.doc.getValue());
                    await writable.close();
                    file.isDirty = false; 
                    renderTabs();
                } catch (err) { 
                    saveFileAs(fileId); 
                }
            } else {
                saveFileAs(fileId);
            }
        }

        async function saveFileAs(fileId = activeFileId) {
            const file = files.find(f => f.id === fileId);
            if (!file) return;
            
            if (hasFSAPI) {
                try {
                    const h = await window.showSaveFilePicker({ 
                        suggestedName: file.name, 
                        types: [{ description: 'Markdown', accept: { 'text/markdown': ['.md'] } }] 
                    });
                    file.fileHandle = h; 
                    file.name = (await h.getFile()).name;
                    const w = await h.createWritable(); 
                    await w.write(file.doc.getValue()); 
                    await w.close();
                    file.isDirty = false; 
                    renderTabs();
                } catch (e) {}
            } else {
                const blob = new Blob([file.doc.getValue()], { type: "text/markdown" });
                const a = document.createElement("a"); 
                a.href = URL.createObjectURL(blob); 
                a.download = file.name;
                a.click(); 
                file.isDirty = false; 
                renderTabs();
            }
        }

        // Alternar Modo Claro/Escuro
        const btnThemeToggle = document.getElementById('btn-theme-toggle');
        const themeIcon = document.getElementById('theme-icon');

        // Ajustar ícone inicial
        themeIcon.className = isDark ? 'ph ph-sun text-xl' : 'ph ph-moon text-xl';

        btnThemeToggle.addEventListener('click', () => {
            isDark = !isDark;
            document.documentElement.classList.toggle('dark', isDark);
            themeIcon.className = isDark ? 'ph ph-sun text-xl' : 'ph ph-moon text-xl';
            cm.setOption('theme', isDark ? 'dracula' : 'default');
            
            // Sincroniza o tema do Highlight.js
            document.getElementById('hljs-theme').href = isDark 
                ? 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css' 
                : 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github.min.css';
        });

        // Drag and Drop (Workspace)
        document.body.addEventListener('dragover', (e) => { e.preventDefault(); e.stopPropagation(); });
        document.body.addEventListener('drop', async (e) => {
            e.preventDefault(); e.stopPropagation();
            if (e.dataTransfer.items) {
                for (let i = 0; i < e.dataTransfer.items.length; i++) {
                    const item = e.dataTransfer.items[i];
                    if (item.kind === 'file') {
                        const file = item.getAsFile();
                        if (file.name.endsWith('.md') || file.name.endsWith('.txt') || file.type.startsWith('text/')) {
                            const text = await file.text();
                            let handle = null;
                            if (hasFSAPI && item.getAsFileSystemHandle) {
                                try { handle = await item.getAsFileSystemHandle(); } catch(err) { }
                            }
                            createNewFile(file.name, text, handle);
                        }
                    }
                }
            }
        });

        // Sync Scroll (Optimized)
        let syncScrollTimeout;
        let isSyncingLeft = false;
        let isSyncingRight = false;

        cm.on('scroll', () => {
            if(isSyncingRight) return;
            isSyncingLeft = true;
            clearTimeout(syncScrollTimeout);
            
            requestAnimationFrame(() => {
                const info = cm.getScrollInfo();
                const percentage = info.top / (info.height - info.clientHeight);
                previewContainer.scrollTop = percentage * (previewContainer.scrollHeight - previewContainer.clientHeight);
                
                syncScrollTimeout = setTimeout(() => { isSyncingLeft = false; }, 50);
            });
        });

        previewContainer.addEventListener('scroll', () => {
            if(isSyncingLeft) return;
            isSyncingRight = true;
            clearTimeout(syncScrollTimeout);

            requestAnimationFrame(() => {
                const percentage = previewContainer.scrollTop / (previewContainer.scrollHeight - previewContainer.clientHeight);
                const info = cm.getScrollInfo();
                cm.scrollTo(null, percentage * (info.height - info.clientHeight));
                
                syncScrollTimeout = setTimeout(() => { isSyncingRight = false; }, 50);
            });
        });

        // Resizer Logic (Optimized)
        let resizing = false;
        
        resizer.addEventListener('mousedown', (e) => { 
            resizing = true; 
            e.preventDefault(); 
            document.body.style.cursor = 'col-resize';
        });
        
        document.addEventListener('mousemove', (e) => { 
            if(resizing) { 
                requestAnimationFrame(() => {
                    const w = (e.clientX / document.body.clientWidth) * 100; 
                    if(w > 15 && w < 85) {
                        leftPane.style.width = `${w}%`; 
                        if (activeFileId) {
                            const file = files.find(f => f.id === activeFileId);
                            if (file) file.splitRatio = w; // Persiste o tamanho customizado
                        }
                    }
                });
            }
        });
        
        document.addEventListener('mouseup', () => { 
            if(resizing) {
                resizing = false;
                document.body.style.cursor = 'default';
                cm.refresh(); // Crucial to fix CodeMirror layout after resize
            }
        });

        // Keyboard Shortcuts
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey)) {
                if (e.key === 's') { e.preventDefault(); saveFile(); }
                if (e.key === 'b') { e.preventDefault(); format('bold'); }
                if (e.key === 'i') { e.preventDefault(); format('italic'); }
            }
        });

        // Initialize First File
        // CRIADO PRIMEIRO: Garante que a aba existe antes do Windows enviar os ficheiros,
        // permitindo que seja removida corretamente se não tiver sido editada.
        createNewFile(`Sem título ${fileCounter++}.md`, "# Hello\n\nAtive o editor para começar.");

        // Integração PWA: File Handling API (Abre os arquivos ao clicar 2x no Windows)
        if ('launchQueue' in window) {
            window.launchQueue.setConsumer(async (launchParams) => {
                if (!launchParams.files || launchParams.files.length === 0) return;
                
                // Se for a primeira inicialização via arquivo e só tiver a aba "Sem título" intocada, remove-a
                if (files.length === 1 && !files[0].isDirty && files[0].name.startsWith('Sem título')) {
                    files = [];
                    activeFileId = null;
                    tabsContainer.innerHTML = '';
                    cm.setValue('');
                }

                for (const handle of launchParams.files) {
                    try {
                        const file = await handle.getFile();
                        const text = await file.text();
                        createNewFile(file.name, text, handle);
                    } catch (err) {
                        console.error("Erro ao abrir arquivo via SO:", err);
                    }
                }
            });
        }
    </script>
</body>
</html>
